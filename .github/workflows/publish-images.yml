name: Build and publish Docker images

on:
  push:
    branches: ["main"]
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tags
        id: set_tags
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ -n "$RELEASE_TAG" ]; then
            TAG="$RELEASE_TAG"
          else
            TAG="$GITHUB_SHA"
          fi
          echo "backend_tags<<EOF" >> $GITHUB_OUTPUT
          printf '%s\n%s\n' "ghcr.io/laplusdestiny/fluxusledger-backend:latest" "ghcr.io/laplusdestiny/fluxusledger-backend:${TAG}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "frontend_tags<<EOF" >> $GITHUB_OUTPUT
          printf '%s\n%s\n' "ghcr.io/laplusdestiny/fluxusledger-frontend:latest" "ghcr.io/laplusdestiny/fluxusledger-frontend:${TAG}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.set_tags.outputs.backend_tags }}
          platforms: linux/amd64

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.set_tags.outputs.frontend_tags }}
          platforms: linux/amd64
