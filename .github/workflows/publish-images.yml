name: Build and publish Docker images

on:
  push:
    branches: [ "main", "github_config" ]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/Laplusdestiny/fluxusledger_backend:latest
            ghcr.io/Laplusdestiny/fluxusledger_backend:${{ github.sha }}
          platforms: linux/amd64

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/Laplusdestiny/fluxusledger_frontend:latest
            ghcr.io/Laplusdestiny/fluxusledger_frontend:${{ github.sha }}
          platforms: linux/amd64
